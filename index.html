<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top left,#ffbfdc 0%,transparent 30%),
    radial-gradient(circle at bottom right,#cdb8ff 0%,transparent 30%),
    linear-gradient(135deg,#1b1d3b,#222655,#2b3170);

    position:relative;
}

/* Floating Stars */

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{

    0%,100%{
        opacity:0.2;
    }

    50%{
        opacity:1;
    }

}

/* Floating Emojis */

.float{
    position:absolute;
    font-size:24px;
    animation:float 12s linear infinite;
}

@keyframes float{

    0%{
        transform:translateY(100vh) rotate(0deg);
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
    }

}

/* Main Box */

.container{

    width:90%;
    max-width:650px;

    text-align:center;

    padding:60px 40px;

    border-radius:35px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:0 20px 50px rgba(0,0,0,0.35);

    z-index:2;
}

/* Title */

.title{

    font-family:'Great Vibes',cursive;

    font-size:5.5rem;

    background:linear-gradient(to right,#ffd7eb,#d8c4ff);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

}

.subtitle{

    color:white;

    margin-top:10px;

    letter-spacing:2px;
}

/* Button */

.btn{

    display:inline-block;

    margin-top:40px;

    padding:16px 40px;

    border-radius:50px;

    text-decoration:none;

    color:white;

    font-weight:600;

    background:linear-gradient(135deg,#ff8fc5,#ba94ff);

    box-shadow:0 10px 25px rgba(186,148,255,0.4);

    transition:0.4s;
}

.btn:hover{

    transform:translateY(-5px) scale(1.05);

}

@media(max-width:768px){

    .title{
        font-size:4rem;
    }

}

</style>
</head>

<body>

<!-- Floating Emojis -->

<div class="float" style="left:10%; animation-duration:12s;">✨</div>
<div class="float" style="left:30%; animation-duration:15s;">💖</div>
<div class="float" style="left:60%; animation-duration:10s;">🌸</div>
<div class="float" style="left:85%; animation-duration:13s;">🦋</div>

<!-- Main -->

<div class="container">

    <h1 class="title">
        Happy Birthday
    </h1>

    <p class="subtitle">
        a magical little surprise ✨
    </p>

    <a href="birthday.html" class="btn">
        Open Surprise 💌
    </a>

</div>

<script>

/* Stars */

for(let i=0;i<120;i++){

    const star=document.createElement("div");

    star.classList.add("star");

    let size=Math.random()*4;

    star.style.width=size+"px";
    star.style.height=size+"px";

    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";

    star.style.animationDelay=Math.random()*5+"s";

    document.body.appendChild(star);

}

</script>

</body>
</html>
